<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#05060d">
<title>水星逆行 · 真实天文 3D 模拟</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#05060d;font-family:-apple-system,"PingFang SC","Hiragino Sans GB",sans-serif;color:#e8e8f0}
#app{position:fixed;inset:0}
canvas{display:block}
.panel{position:fixed;background:rgba(12,14,28,.72);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px 14px;z-index:5}
#info{top:12px;left:12px;max-width:250px}
#info h1{font-size:14px;font-weight:700;letter-spacing:.5px;margin-bottom:6px;color:#fff}
#date{font-size:22px;font-weight:800;color:#ffd27d;letter-spacing:1px}
#sub{font-size:11px;color:#9aa0c0;margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;padding:5px 12px;border-radius:20px;margin-top:9px}
.badge.g{background:rgba(46,139,87,.22);color:#5fd497;border:1px solid rgba(46,139,87,.5)}
.badge.r{background:rgba(192,57,43,.25);color:#ff8a7a;border:1px solid rgba(192,57,43,.6)}
#retroList{margin-top:10px;font-size:11.5px;color:#aab0d0;line-height:1.7}
#retroList .w{display:block;padding:2px 0}
#retroList .w.now{color:#ff8a7a;font-weight:700}
.plabel{font-size:12px;font-weight:600;color:#fff;background:rgba(8,10,22,.55);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:1px 9px;white-space:nowrap;pointer-events:none;text-shadow:0 1px 2px #000}
#ctrl{bottom:12px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:11px;flex-wrap:wrap;justify-content:center;max-width:94vw}
#ctrl button{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:7px 12px;font-size:13px;cursor:pointer}
#ctrl button:hover{background:rgba(255,255,255,.16)}
#ctrl button.act{background:#7d3c98;border-color:#7d3c98}
#ctrl label{font-size:12px;color:#9aa0c0}
#ctrl input[type=range]{width:120px;accent-color:#ffd27d}
#spd{font-size:12px;color:#ffd27d;min-width:74px;text-align:right}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:#9aa0c0;background:#05060d;z-index:20}
.hint{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);font-size:11px;color:#6a7090;z-index:5}
</style></head><body>
<div id="app"></div>
<div id="loading">正在加载真实星历、行星贴图与 3D 引擎…</div>
<div class="panel" id="info">
  <h1>☿ 水星逆行 · 真实天文模拟</h1>
  <div id="date">—</div>
  <div id="sub">真实 VSOP87 星历 · NASA 行星贴图</div>
  <div id="status" class="badge g">顺行</div>
  <div id="retroList"></div>
</div>
<div class="hint">拖动旋转 · 滚轮/双指缩放</div>
<div class="panel" id="ctrl">
  <button id="play" class="act">⏸ 暂停</button>
  <label>速度</label><input id="speed" type="range" min="1" max="60" step="1" value="14">
  <span id="spd">14 天/秒</span>
  <button id="today">回到今天</button>
  <button id="topview">俯视</button>
</div>
<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {CSS2DRenderer, CSS2DObject} from 'three/addons/renderers/CSS2DRenderer.js';
const A = window.Astronomy;
const SCALE = 90;
const TEX = 'https://cdn.jsdelivr.net/gh/jeromeetienne/threex.planets@master/images/';
const PLANETS = [
  {body:A.Body.Mercury, name:'水星', tex:'mercurymap.jpg', color:0x9aa7b5, size:2.2, period:88,  spin:0.004},
  {body:A.Body.Venus,   name:'金星', tex:'venusmap.jpg',   color:0xe8c07a, size:3.2, period:225, spin:0.002},
  {body:A.Body.Earth,   name:'地球', tex:'earthmap1k.jpg', color:0x4a90d9, size:3.4, period:365, spin:0.02, earth:true},
  {body:A.Body.Mars,    name:'火星', tex:'marsmap1k.jpg',  color:0xd9603a, size:2.8, period:687, spin:0.018},
];

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 8000);
camera.position.set(80, 130, 210);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
document.getElementById('app').appendChild(renderer.domElement);
const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(innerWidth, innerHeight);
labelRenderer.domElement.style.position='absolute';
labelRenderer.domElement.style.top='0';
labelRenderer.domElement.style.pointerEvents='none';
document.getElementById('app').appendChild(labelRenderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08;

const loader = new THREE.TextureLoader();
const T = u => { const t=loader.load(TEX+u); t.colorSpace=THREE.SRGBColorSpace; return t; };

// 星空
const sg=new THREE.BufferGeometry(),sp=[];
for(let i=0;i<2800;i++){const r=2200+Math.random()*2000,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);sp.push(r*Math.sin(ph)*Math.cos(th),r*Math.cos(ph),r*Math.sin(ph)*Math.sin(th));}
sg.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:1.5,sizeAttenuation:false,transparent:true,opacity:.85})));

function makeLabel(text){const d=document.createElement('div');d.className='plabel';d.textContent=text;return new CSS2DObject(d);}

// 太阳(真实贴图 + 自发光)
const sun=new THREE.Mesh(new THREE.SphereGeometry(8,48,48),new THREE.MeshBasicMaterial({map:T('sunmap.jpg'),color:0xffffff}));
scene.add(sun);
const sl=makeLabel('太阳'); sl.position.set(0,11,0); sun.add(sl);
scene.add(new THREE.PointLight(0xffffff,2.6,0,0));
scene.add(new THREE.AmbientLight(0xffffff,0.32));
const halo=new THREE.Mesh(new THREE.SphereGeometry(12,32,32),new THREE.MeshBasicMaterial({color:0xffcf5a,transparent:true,opacity:.10,side:THREE.BackSide}));
scene.add(halo);

function helioPos(body,time){const ec=A.Ecliptic(A.HelioVector(body,time));return new THREE.Vector3(ec.vec.x*SCALE,ec.vec.z*SCALE,-ec.vec.y*SCALE);}
function geoElon(time){return A.Ecliptic(A.GeoVector(A.Body.Mercury,time,true)).elon;}

const meshes={};
for(const p of PLANETS){
  const mat=new THREE.MeshStandardMaterial({map:T(p.tex),roughness:.92,metalness:.0,color:0xffffff});
  if(p.earth){mat.bumpMap=T('earthbump1k.jpg');mat.bumpScale=0.6;}
  const m=new THREE.Mesh(new THREE.SphereGeometry(p.size,48,48),mat);
  m.rotation.z=0.41; // 自转轴倾角
  scene.add(m); meshes[p.name]=m;
  if(p.earth){ // 云层
    const cl=new THREE.Mesh(new THREE.SphereGeometry(p.size*1.02,48,48),new THREE.MeshStandardMaterial({map:T('earthcloudmaptrans.jpg'),transparent:true,opacity:.55,depthWrite:false}));
    m.add(cl); m.userData.cloud=cl;
  }
  const lab=makeLabel(p.name); lab.position.set(0,p.size+2.5,0); m.add(lab);
  // 真实轨道
  const pts=[],t0=new Date(Date.UTC(2026,0,1));
  for(let d=0;d<=p.period;d+=Math.max(1,p.period/240)) pts.push(helioPos(p.body,A.MakeTime(new Date(t0.getTime()+d*86400000))));
  pts.push(pts[0]);
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:p.color,transparent:true,opacity:.32})));
}

// 黄道参考环 + 视线 + 视位置
const RR=240,rp=[];for(let i=0;i<=128;i++){const a=i/128*Math.PI*2;rp.push(new THREE.Vector3(RR*Math.cos(a),0,RR*Math.sin(a)));}
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(rp),new THREE.LineBasicMaterial({color:0x555a7a,transparent:true,opacity:.35})));
const sightMat=new THREE.LineBasicMaterial({color:0xff5a4a});
const sightGeo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(),new THREE.Vector3()]);
scene.add(new THREE.Line(sightGeo,sightMat));
const appMark=new THREE.Mesh(new THREE.SphereGeometry(2.6,16,16),new THREE.MeshBasicMaterial({color:0x5fd497}));
scene.add(appMark);
const appLab=makeLabel('你看到的水星'); appLab.position.set(0,5,0); appMark.add(appLab);
function rayHit(E,dir){const f=E.clone(),b=2*f.dot(dir),c=f.dot(f)-RR*RR,disc=Math.max(0,b*b-4*c),s=(-b+Math.sqrt(disc))/2;return E.clone().add(dir.clone().multiplyScalar(s));}

function computeRetro(){const out=[];let inR=false,start=null,prev=null;
  for(let d=0;d<365;d++){const t=A.MakeTime(new Date(Date.UTC(2026,0,1)+d*86400000)),e=geoElon(t);
    if(prev!==null){let dl=e-prev;if(dl>180)dl-=360;if(dl<-180)dl+=360;const r=dl<0;
      if(r&&!inR){inR=true;start=new Date(Date.UTC(2026,0,1)+d*86400000);}
      if(!r&&inR){inR=false;out.push([start,new Date(Date.UTC(2026,0,1)+d*86400000)]);}}
    prev=e;}
  if(inR)out.push([start,new Date(Date.UTC(2026,11,31))]);return out;}
const RETRO=computeRetro();
const fmt=dt=>`${dt.getUTCMonth()+1}/${dt.getUTCDate()}`;

let simDate=new Date(Date.UTC(2026,5,26,12,0,0)),playing=true,speed=14,prevElon=null;
const $=id=>document.getElementById(id);
function updateRetroList(){$('retroList').innerHTML='<b style="color:#cfd4ee">2026 水逆期：</b>'+RETRO.map(w=>{const now=simDate>=w[0]&&simDate<=w[1];return `<span class="w ${now?'now':''}">${now?'▶ ':'· '}${fmt(w[0])} → ${fmt(w[1])}</span>`;}).join('');}

function render(){
  const t=A.MakeTime(simDate);
  for(const p of PLANETS){meshes[p.name].position.copy(helioPos(p.body,t));meshes[p.name].rotation.y+=p.spin;if(meshes[p.name].userData.cloud)meshes[p.name].userData.cloud.rotation.y+=0.003;}
  sun.rotation.y+=0.001;
  const E=meshes['地球'].position,M=meshes['水星'].position;
  const dir=M.clone().sub(E).normalize(),Ap=rayHit(E,dir);
  sightGeo.setFromPoints([E.clone(),Ap]); appMark.position.copy(Ap);
  const elon=geoElon(t);let retro=false;
  if(prevElon!==null){let dl=elon-prevElon;if(dl>180)dl-=360;if(dl<-180)dl+=360;retro=dl<0;}
  prevElon=elon;
  const col=retro?0xff5a4a:0x5fd497;sightMat.color.setHex(col);appMark.material.color.setHex(col);
  $('date').textContent=`${simDate.getUTCFullYear()}-${String(simDate.getUTCMonth()+1).padStart(2,'0')}-${String(simDate.getUTCDate()).padStart(2,'0')}`;
  const sb=$('status');
  if(retro){sb.className='badge r';sb.innerHTML='☿ 逆行（视位置在倒退）';}
  else{sb.className='badge g';sb.innerHTML='☿ 顺行（正常前进）';}
}
let ut=0;
function loop(){requestAnimationFrame(loop);
  if(playing)simDate=new Date(simDate.getTime()+speed*86400000/60);
  render(); if(++ut%15===0)updateRetroList();
  controls.update(); halo.scale.setScalar(1+0.04*Math.sin(Date.now()*0.002));
  renderer.render(scene,camera); labelRenderer.render(scene,camera);}

$('play').onclick=function(){playing=!playing;this.textContent=playing?'⏸ 暂停':'▶ 播放';this.classList.toggle('act',playing);};
$('speed').oninput=function(){speed=+this.value;$('spd').textContent=speed+' 天/秒';};
$('today').onclick=()=>{simDate=new Date(Date.UTC(2026,5,26,12,0,0));prevElon=null;};
$('topview').onclick=()=>{camera.position.set(0,320,0.1);controls.update();};
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);labelRenderer.setSize(innerWidth,innerHeight);});

document.getElementById('loading').style.display='none';
updateRetroList(); loop();
</script></body></html>
