 <div class="bless">吉日良辰，心诚则灵；持正念，得天佑。</div>`;}
function render(){rail();axis();grid();detail();}
document.getElementById('prev').onclick=()=>{if(ci>0){ci--;sel=null;render();}};

// ---------- 视图切换 ----------
const VIEWS={home:'vhome',cal:'vcal',fortune:'vfortune',me:'vme'};
const NAVS={home:'nhome',cal:'ncal',fortune:'nfortune',me:'nme'};
function switchView(v){
 for(const k in VIEWS)document.getElementById(VIEWS[k]).style.display=(k===v?'':'none');
 for(const k in NAVS)document.getElementById(NAVS[k]).classList.toggle('on',k===v);
 if(v==='home')renderHome();if(v==='fortune')renderFortune();if(v==='me')renderMe();if(v==='cal')render();
}
for(const k in NAVS)document.getElementById(NAVS[k]).onclick=()=>switchView(k);
